<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeGuard Pro Max 終極控制台</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif; background-color: #0e0e0e;
            color: #ffffff; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; padding: 20px;
        }
        h1 { color: #00d2ff; margin-bottom: 5px; font-size: 28px; text-shadow: 0 0 10px rgba(0,210,255,0.3); }
        
        /* 模式切換按鈕區 */
        .mode-toggles {
            display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; justify-content: center;
        }
        .mode-btn {
            background-color: #1a1a1a; color: #888; border: 2px solid #333;
            padding: 12px 24px; border-radius: 25px; cursor: pointer;
            font-weight: bold; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode-btn:hover { border-color: #00d2ff; color: #fff; }
        .mode-btn.active {
            background-color: #00d2ff; color: #000; border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        /* 儀表板架構 */
        .container {
            display: flex; gap: 25px; max-width: 1000px; width: 100%; justify-content: center; flex-wrap: wrap;
        }
        .dashboard { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; flex: 2; }
        
        .card {
            background-color: #161616; border: 2px solid #262626;
            border-radius: 18px; padding: 25px; text-align: center;
            width: 160px; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 { margin: 0 0 12px 0; font-size: 16px; color: #888888; letter-spacing: 0.5px; }
        .card .value { font-size: 42px; font-weight: bold; color: #ffffff; margin-bottom: 5px; }
        .card .unit { font-size: 13px; color: #666666; }
        
        #card-heart { border-color: #ff4757; box-shadow: 0 4px 15px rgba(255,71,87,0.1); }
        #heartRate { color: #ff4757; }

        /* ✨ 新增：歷史排行榜樣式 */
        .leaderboard-panel {
            background-color: #161616; border: 2px solid #262626; border-radius: 18px;
            padding: 20px; width: 260px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); flex: 1;
            min-width: 240px;
        }
        .leaderboard-panel h3 { margin: 0 0 15px 0; color: #ffd700; text-align: center; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .pwr-list { list-style: none; padding: 0; margin: 0; }
        .pwr-item {
            display: flex; justify-content: space-between; padding: 8px 12px;
            border-bottom: 1px solid #222; font-size: 15px; font-family: monospace;
        }
        .pwr-item:nth-child(1) { color: #ffd700; font-weight: bold; } /* 第一名金牌色 */
        .pwr-item:nth-child(2) { color: #c0c0c0; }
        .pwr-item:nth-child(3) { color: #cd7f32; }
        .rank-num { color: #555; }

        .sys-btn {
            margin: 30px 0; padding: 14px 35px; font-size: 16px; font-weight: bold;
            color: #fff; background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3); transition: all 0.3s;
        }
        .sys-btn:hover { transform: scale(1.03); box-shadow: 0 6px 25px rgba(0, 210, 255, 0.5); }
        #status { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>🛡️ LifeGuard Pro Max 生態控制台</h1>
    <div id="status">系統就緒，等待連線安全通道...</div>
    <button id="connectBtn" class="sys-btn">🔗 握手連接智慧手環</button>
    
    <div class="mode-toggles">
        <button id="btnMode1" class="mode-btn active" onclick="setMode(1)">1. 專業健康防護</button>
        <button id="btnMode2" class="mode-btn" onclick="setMode(2)">2. 競技爆發表現</button>
        <button id="btnMode3" class="mode-btn" onclick="setMode(3)">3. 全天候計步綜合</button>
    </div>

    <div class="container">
        <div class="dashboard">
            <div class="card" id="card1">
                <h2 id="title1">翻滾角 (Roll)</h2>
                <div class="value" id="val1">0</div>
                <div class="unit" id="unit1">度 (Deg)</div>
            </div>
            <div class="card" id="card2">
                <h2 id="title2">俯仰角 (Pitch)</h2>
                <div class="value" id="val2">0</div>
                <div class="unit" id="unit2">度 (Deg)</div>
            </div>
            <div class="card" id="card-heart">
                <h2 id="titleHeart">即時心率</h2>
                <div class="value" id="heartRate">0</div>
                <div class="unit" id="unitHeart">BPM</div>
            </div>
        </div>

        <div class="leaderboard-panel">
            <h3>🏆 歷史十大爆發力排行榜</h3>
            <ul class="pwr-list" id="pwrLeaderboard">
                <li class="pwr-item"><span class="rank-num">#01</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#02</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#03</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#04</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#05</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#06</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#07</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#08</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#09</span> <span>0.0 rad/s</span></li>
                <li class="pwr-item"><span class="rank-num">#10</span> <span>0.0 rad/s</span></li>
            </ul>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let bluetoothDevice;
        let characteristic;
        
        // 全域動態模式狀態與智慧資料儲存庫
        let activeMode = 1;
        let pwrHistory = Array(10).fill(0.0); // 初始化前十強儲存陣列
        let lastReceivedPwr = 0.0;           // 用於捕捉最高波峰的濾波暫存器

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                document.getElementById('status').innerText = "藍牙射頻搜尋中...";
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'LifeGuard_Pro' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleData);
                
                document.getElementById('status').innerText = "🚀 安全通道建立成功！連線穩固。";
                document.getElementById('connectBtn').innerText = "通道已鎖定";
                document.getElementById('connectBtn').style.background = "#28a745";

                bluetoothDevice.addEventListener('gattserverdisconnected', () => {
                    document.getElementById('status').innerText = "💔 設備離線，射頻廣播重啟中...";
                    document.getElementById('connectBtn').innerText = "🔗 重新建立通道";
                    document.getElementById('connectBtn').style.background = "linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%)";
                });
            } catch (error) {
                document.getElementById('status').innerText = "❌ 握手失敗：" + error.message;
            }
        });

        // 核心：多變格式動態串流資料解算器
        function handleData(event) {
            const dataString = new TextDecoder('utf-8').decode(event.target.value); 
            const parts = dataString.split(',');
            
            parts.forEach(part => {
                // ─── 模式 1：健康防護 ───
                if (part.startsWith('R:')) document.getElementById('val1').innerText = part.substring(2);
                if (part.startsWith('P:')) document.getElementById('val2').innerText = part.substring(2);
                if (part.startsWith('H:')) document.getElementById('heartRate').innerText = part.substring(2);
                
                // ─── 模式 2：運動表現 (附帶歷史紀錄器) ───
                if (part.startsWith('S:')) document.getElementById('val1').innerText = part.substring(2);
                if (part.startsWith('W:')) {
                    let currentPwr = parseFloat(part.substring(2));
                    document.getElementById('val2').innerText = currentPwr.toFixed(1);
                    
                    // 智慧排行榜捕捉邏輯：
                    // 當數值大於暫存，代表動作正在發生並衝向峰值，不斷刷新暫存
                    if (currentPwr > lastReceivedPwr) {
                        lastReceivedPwr = currentPwr;
                    } 
                    // 當手環演算法回傳 0.0，代表該次揮擊徹底結束，立刻把剛剛儲存的最高波峰塞入陣列排序！
                    else if (currentPwr === 0.0 && lastReceivedPwr > 1.0) {
                        updatePwrLeaderboard(lastReceivedPwr);
                        lastReceivedPwr = 0.0; // 釋放暫存器迎接下一次出拳
                    }
                }

                // ─── 模式 3：計步綜合 ───
                if (part.startsWith('K:')) document.getElementById('val1').innerText = part.substring(2);
                if (part.startsWith('D:')) document.getElementById('val2').innerText = part.substring(2);
                if (part.startsWith('C:')) document.getElementById('heartRate').innerText = part.substring(2);
            });
        }

        // ✨ 新增：前十強降序動態更新引擎
        function updatePwrLeaderboard(newPwr) {
            // 如果新數值大於目前榜上的最低分數，才需要處理
            if (newPwr > pwrHistory[9]) {
                pwrHistory.push(newPwr);           // 塞入新成績
                pwrHistory.sort((a, b) => b - a);  // 降序（大到小）排列
                pwrHistory.pop();                  // 踢除第 11 名
                
                // 刷新網頁排行榜 UI 列表
                const listContainer = document.getElementById('pwrLeaderboard');
                listContainer.innerHTML = "";
                for(let i = 0; i < 10; i++) {
                    const rankStr = String(i + 1).padStart(2, '0');
                    listContainer.innerHTML += `<li class="pwr-item"><span class="rank-num">#${rankStr}</span> <span>${pwrHistory[i].toFixed(1)} rad/s</span></li>`;
                }
            }
        }

        // 模式動態 UI 排版渲染切換器
        async function setMode(mode) {
            activeMode = mode;
            document.getElementById('btnMode1').classList.remove('active');
            document.getElementById('btnMode2').classList.remove('active');
            document.getElementById('btnMode3').classList.remove('active');
            document.getElementById('btnMode' + mode).classList.add('active');

            // 根據模式優化卡片文字與計量單位
            if (mode === 1) {
                document.getElementById('title1').innerText = "翻滾角 (Roll)";   document.getElementById('unit1').innerText = "度 (Deg)";
                document.getElementById('title2').innerText = "俯仰角 (Pitch)";  document.getElementById('unit2').innerText = "度 (Deg)";
                document.getElementById('titleHeart').innerText = "即時心率";     document.getElementById('unitHeart').innerText = "BPM";
                document.getElementById('card-heart').style.borderColor = "#ff4757";
            } 
            else if (mode === 2) {
                document.getElementById('title1').innerText = "瞬時速率 (SPD)"; document.getElementById('unit1').innerText = "公尺/秒 (m/s)";
                document.getElementById('title2').innerText = "爆發力 (PWR)";   document.getElementById('unit2').innerText = "徑度/秒 (rad/s)";
                document.getElementById('titleHeart').innerText = "動作狀態";     document.getElementById('unitHeart').innerText = "狀態標籤";
                document.getElementById('heartRate').innerText = "READY";
                document.getElementById('card-heart').style.borderColor = "#262626";
            } 
            else { // ✨ 模式 3 排版架構
                document.getElementById('title1').innerText = "累計步數 (STEPS)"; document.getElementById('unit1').innerText = "步 (Steps)";
                document.getElementById('title2').innerText = "步行距離 (DIST)";  document.getElementById('unit2').innerText = "公里 (Km)";
                document.getElementById('titleHeart').innerText = "熱量消耗 (CAL)"; document.getElementById('unitHeart').innerText = "大卡 (Kcal)";
                document.getElementById('card-heart').style.borderColor = "#ffa500"; // 暖橘色代表燃燒熱量
            }

            // 發送雙向藍牙同步指令
            if (characteristic) {
                try {
                    const encoder = new TextEncoder();
                    await characteristic.writeValue(encoder.encode(mode.toString()));
                } catch (err) {
                    console.error("發送控制指令失敗", err);
                }
            }
        }
    </script>
</body>
</html>
